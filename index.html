                                            <div className="flex justify-between text-gray-500"><span>Refundable Book Deposit</span> <span className="text-black">$250.00</span></div>
                                        </div>
                                        <div className="bg-blue-50/50 p-4 flex justify-between items-center mb-8 rounded font-bold">
                                            <span className="text-sm">Order Total</span>
                                            <span className="text-lg">${(subtotal + 30 + data.alphaTax).toLocaleString()}</span>
                                        </div>
                                        <div className="space-y-4 mb-8">
                                            <label className="flex items-center gap-3 text-xs text-gray-500"><div className="w-4 h-4 border rounded"></div> I agree to email communication</label>
                                            <label className="flex items-center gap-3 text-xs text-gray-500"><div className="w-4 h-4 bg-black rounded flex items-center justify-center text-white text-[10px]">✓</div> I agree to the BARBRI Global Policies</label>
                                            <label className="flex items-center gap-3 text-xs text-gray-500"><div className="w-4 h-4 bg-black rounded flex items-center justify-center text-white text-[10px]">✓</div> I agree to the Privacy Policy</label>
                                        </div>
                                        <button className="w-full py-4 bg-[#111827] text-white rounded-xl font-bold uppercase tracking-widest text-sm shadow-xl">Submit Order</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }
            }

            // ---------------------------------------------------------
            // ORIGINAL KAPTEST / ALPHA RENDERING
            // ---------------------------------------------------------
            if (viewMode === 'kaptest') {
                const subtotal = data.kaptestItems.reduce((acc, i) => acc + i.price, 0);
                const total = subtotal + 20.00; // Flat $20 shipping in legacy images

                return (
                    <div className="min-h-screen bg-white">
                        <Controls activeProduct={activeProduct} setActiveProduct={setActiveProduct} viewMode={viewMode} setViewMode={setViewMode} productData={productData} />
                        
                        <header className="px-10 py-4 flex justify-between items-center border-b">
                            {data.brand === 'kaplan' ? (
                                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Kaplan_Inc_Logo.svg" className="h-8" />
                            ) : (
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white font-black">M</div>
                                    <div className="font-black text-sm uppercase tracking-tighter">Manhattan Prep</div>
                                </div>
                            )}
                            <div className="text-xs font-bold text-slate-700">{data.phone}</div>
                        </header>

                        {data.promo && (
                            <div className={`${data.bannerColor} py-2 text-center text-[13px] font-bold tracking-tight`}>
                                {data.promo}
                            </div>
                        )}

                        <main className="max-w-[1200px] mx-auto py-12 px-10 grid grid-cols-1 lg:grid-cols-3 gap-16">
                            <div className="lg:col-span-2 space-y-12">
                                <section>
                                    <h2 className="text-[20px] font-bold uppercase tracking-tight mb-8">Account Information</h2>
                                    <div className="space-y-6">
                                        <div className="text-[14px]">Hi there, Eugene</div>
                                        <div>
                                            <label className="kaptest-label">Email</label>
                                            <div className="kaptest-input">eugene.cuoco@gmail.com</div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-8">
                                            <div>
                                                <label className="kaptest-label">First Name</label>
                                                <div className="kaptest-input">Eugene</div>
                                            </div>
                                            <div>
                                                <label className="kaptest-label">Last Name</label>
                                                <div className="kaptest-input">Cuoco</div>
                                            </div>
                                        </div>
                                        <div className="pt-8 font-bold text-[14px]">Where should we send your study materials?</div>
                                        <div className="grid grid-cols-2 gap-8">
                                            <div>
                                                <label className="kaptest-label">Address</label>
                                                <div className="kaptest-input border-slate-300"></div>
                                            </div>
                                            <div>
                                                <label className="kaptest-label">Apt. / Suite (optional)</label>
                                                <div className="kaptest-input border-slate-300"></div>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                                <section>
                                    <h2 className="text-[20px] font-bold uppercase tracking-tight mb-4">Additional Information</h2>
                                    <div className="text-[13px] text-slate-500 mb-6">This will help us personalize your prep</div>
                                    <div className="h-40 border border-dotted border-slate-200 rounded flex items-center justify-center text-xs italic text-slate-400">
                                        Form continues based on product selection...
                                    </div>
                                </section>
                            </div>

                            <aside className="lg:col-span-1">
                                <div className="border border-slate-200 rounded p-8">
                                    <h2 className="text-[20px] font-bold uppercase tracking-tight mb-8">Order Summary</h2>
                                    <div className="space-y-6 mb-8">
                                        {data.kaptestItems.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-start text-[13px]">
                                                <div className="flex gap-3">
                                                    <div className="w-5 h-5 rounded-full bg-cyan-500 flex items-center justify-center text-white font-bold text-[16px]">-</div>
                                                    <span className="max-w-[150px] leading-tight font-medium">{item.name}</span>
                                                </div>
                                                <span className="font-medium">${item.price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="border-t pt-6 space-y-3">
                                        <div className="flex justify-between text-[13px]">
                                            <span className="text-slate-500 italic">Apply Promo</span>
                                            <button className="px-6 py-1 border border-indigo-600 rounded text-indigo-600 font-bold text-xs">Apply</button>
                                        </div>
                                        <div className="flex justify-between text-[13px] pt-4">
                                            <span className="text-slate-600">Printed Book(s)</span>
                                            <span>${data.kaptestItems.find(i => i.name.includes("Book"))?.price.toFixed(2) || '0.00'}</span>
                                        </div>
                                        <div className="flex justify-between text-[13px]">
                                            <span className="text-slate-600">Shipping</span>
                                            <span>$20.00</span>
                                        </div>
                                        <div className="flex justify-between pt-4 border-t border-slate-800 font-bold text-[14px]">
                                            <span>TOTAL</span>
                                            <span>${total.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                                        </div>
                                    </div>
                                </div>
                            </aside>
                        </main>
                    </div>
                );
            }

            // Alpha Layout (Combined or Split)
            const subtotalAlpha = data.alphaItems.reduce((acc, i) => acc + i.price, 0);
            const shippingOptions = [
                { id: 'ground', label: 'Ground', total: data.alphaShipping.ground, handling: 11.37 },
                { id: '2day', label: '2nd Day Air', total: data.alphaShipping.secondDay, handling: 17.49 },
                { id: 'nextsaver', label: 'Next Day Air Saver', total: data.alphaShipping.nextSaver, handling: 17.49 },
                { id: 'nextday', label: 'Next Day Air', total: data.alphaShipping.nextDay, handling: 17.49 }
            ];
            const currentShip = shippingOptions.find(o => o.id === shippingMethodId);
            const finalTotal = subtotalAlpha + currentShip.total + data.alphaTax;

            return (
                <div className="min-h-screen py-8">
                    <Controls activeProduct={activeProduct} setActiveProduct={setActiveProduct} viewMode={viewMode} setViewMode={setViewMode} productData={productData} />
                    
                    <div className="max-w-[1600px] mx-auto bg-gray-50 p-12 rounded-2xl shadow-sm border border-gray-200">
                        <div className="flex justify-between items-center mb-10">
                            <h1 className="text-[27px] font-bold text-slate-900">Checkout</h1>
                            <div className="px-4 py-1 rounded bg-indigo-50 border border-indigo-100">
                                <span className="text-[11px] font-bold text-indigo-700 uppercase tracking-widest">
                                    {viewMode === 'alphaCombined' ? 'Alpha: Transition State' : 'Alpha: Proposed Future State'}
                                </span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-20">
                            <div className="space-y-12">
                                <section>
                                    <h2 className="text-[18px] font-semibold mb-5 text-slate-800">Shipping Address</h2>
                                    <div className="bg-white border border-gray-200 rounded-lg shadow-sm p-8">
                                        <div className="text-slate-600 text-[13.5px] leading-relaxed">
                                            <p className="font-bold text-slate-900 text-[15px] mb-1">Eugene Cuoco</p>
                                            <p>9101 Shore Rd</p>
                                            <p>Apt 203</p>
                                            <p>Brooklyn, NY, 11209-6169</p>
                                            <p>United States</p>
                                        </div>
                                    </div>
                                </section>

                                <section>
                                    <div className="flex justify-between items-end mb-5">
                                        <h2 className="text-[18px] font-semibold text-slate-800">Shipping Method</h2>
                                        <span className="text-indigo-700 underline font-medium text-[13.5px]">Shipping Policy</span>
                                    </div>
                                    <div className="bg-white border border-gray-200 rounded-lg shadow-sm divide-y divide-gray-100">
                                        {shippingOptions.map(opt => (
                                            <label key={opt.id} className={`flex items-start p-8 cursor-pointer transition-colors ${shippingMethodId === opt.id ? 'bg-indigo-50/40' : 'hover:bg-gray-50'}`}>
                                                <div className="pt-1">
                                                    <div className={`custom-radio rounded-full border-2 flex items-center justify-center ${shippingMethodId === opt.id ? 'border-indigo-700' : 'border-gray-300'}`}>
                                                        {shippingMethodId === opt.id && <div className="w-3 h-3 rounded-full bg-indigo-700" />}
                                                    </div>
                                                </div>
                                                <div className="ml-6 flex-grow">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[15.5px] font-bold">{opt.label}</span>
                                                        <span className="text-[15.5px] font-bold text-slate-900">
                                                            ${viewMode === 'alphaSplit' ? (opt.total - opt.handling).toFixed(2) : opt.total.toFixed(2)}
                                                        </span>
                                                    </div>
                                                    {viewMode === 'alphaSplit' && (
                                                        <div className="flex justify-between text-[12.5px] text-slate-500 mt-1">
                                                            <span>Handling Fee</span>
                                                            <span>${opt.handling.toFixed(2)}</span>
                                                        </div>
                                                    )}
                                                </div>
                                                <input type="radio" className="hidden" name="ships" checked={shippingMethodId === opt.id} onChange={() => setShippingMethodId(opt.id)} />
                                            </label>
                                        ))}
                                    </div>
                                </section>
                            </div>

                            <div className="space-y-8">
                                <div className="bg-white border border-gray-200 rounded-xl shadow-md p-10">
                                    <div className="flex justify-between items-center mb-10 border-b pb-6">
                                        <h2 className="text-[22.5px] font-bold text-slate-800">Order Summary</h2>
                                        <div className="flex gap-12 text-[8.5px] font-black text-slate-400 uppercase tracking-widest mr-2">
                                            <span>Quantity</span>
                                            <span>Unit Price</span>
                                        </div>
                                    </div>
                                    <div className="space-y-8 mb-12">
                                        {data.alphaItems.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center">
                                                <p className="font-bold text-slate-900 text-[15px]">{item.name}</p>
                                                <div className="flex gap-16 text-[13.5px] font-medium text-slate-600">
                                                    <span className="w-8 text-center">{item.qty}</span>
                                                    <span className="w-24 text-right">${item.price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-5 text-[14px] font-medium bg-slate-50 p-8 rounded-xl border border-slate-100">
                                        <div className="flex justify-between text-slate-500">
                                            <span>Subtotal:</span>
                                            <span className="text-slate-900 font-bold">${subtotalAlpha.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                                        </div>
                                        {viewMode === 'alphaCombined' ? (
                                            <div className="flex justify-between text-slate-500">
                                                <span>Shipping:</span>
                                                <span className="text-slate-900 font-bold">${currentShip.total.toFixed(2)}</span>
                                            </div>
                                        ) : (
                                            <React.Fragment>
                                                <div className="flex justify-between text-slate-500">
                                                    <span>Shipping:</span>
                                                    <span className="text-slate-900 font-bold">${(currentShip.total - currentShip.handling).toFixed(2)}</span>
                                                </div>
                                                <div className="flex justify-between text-slate-500">
                                                    <span>Handling:</span>
                                                    <span className="text-slate-900 font-bold">${currentShip.handling.toFixed(2)}</span>
                                                </div>
                                            </React.Fragment>
                                        )}
                                        <div className="flex justify-between text-slate-500 pb-4 border-b">
                                            <span>Estimated Tax:</span>
                                            <span className="text-slate-900 font-bold">${data.alphaTax.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                                        </div>
                                        <div className="flex justify-between pt-5">
                                            <span className="text-[23.5px] font-black uppercase">Total:</span>
                                            <span className="text-[23.5px] font-black">${finalTotal.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-8 px-2">
                                    <label className="flex items-start gap-5 cursor-pointer">
                                        <div className={`custom-check mt-0.5 flex-shrink-0 rounded border-2 flex items-center justify-center ${agreed ? 'bg-indigo-900 border-indigo-900' : 'bg-white border-gray-300'}`}>
                                            {agreed && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                                        </div>
                                        <span className="text-[14px] text-slate-600">I agree to the <span className="text-indigo-700 font-bold underline">Terms of Use</span> and the <span className="text-indigo-700 font-bold underline">Privacy Policy</span>.</span>
                                        <input type="checkbox" className="hidden" checked={agreed} onChange={() => setAgreed(!agreed)} />
                                    </label>
                                    <button className="w-full py-5 rounded-full font-bold text-[19px] bg-slate-200 text-slate-500 opacity-60">Place Order</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Controls = ({ activeProduct, setActiveProduct, viewMode, setViewMode, productData }) => (
            <div className="max-w-[1600px] mx-auto mb-10 space-y-4 no-print px-4">
                <div className="flex flex-wrap items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest mr-2">Step 1: Select Product</span>
                    <div className="flex gap-2">
                        {Object.keys(productData).map(prod => (
                            <button key={prod} onClick={() => setActiveProduct(prod)} className={`px-5 py-2 rounded-lg font-bold transition-all text-xs ${activeProduct === prod ? 'bg-indigo-900 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                {prod}
                            </button>
                        ))}
                    </div>
                    <div className="h-8 w-px bg-slate-200 mx-4"></div>
                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest mr-2">Step 2: Choose State</span>
                    <div className="flex bg-slate-100 p-1 rounded-lg">
                        {[
                            { id: 'kaptest', label: 'Kaptest (Legacy)' },
                            { id: 'alphaCombined', label: 'Alpha (Combined)' },
                            { id: 'alphaSplit', label: 'Alpha (Split S&H)' },
                            { id: 'competitor', label: 'Competitor' }
                        ].map(m => (
                            <button key={m.id} onClick={() => setViewMode(m.id)} className={`px-6 py-2 rounded-md font-bold text-[10px] uppercase transition-all ${viewMode === m.id ? 'bg-white text-indigo-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                {m.label}
                            </button>
                        ))}
                    </div>
                    {viewMode === 'competitor' && (
                        <div className="ml-auto text-[11px] font-bold text-indigo-600 uppercase bg-indigo-50 px-3 py-1 rounded border border-indigo-100">
                            Viewing: {productData[activeProduct].competitor}
                        </div>
                    )}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
